services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collab-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI:-mongodb+srv://sibandalerato233_db_user:Lerato759604@a3.5bucmyt.mongodb.net/collabcode?appName=A3}
      - SESSION_SECRET=${SESSION_SECRET:-collab-code-secret-key}
    volumes:
      # Persist uploaded files
      - backend-uploads:/app/uploads
      # Mount source code for development (optional, comment out for production)
      # - ./backend/src:/app/src
    networks:
      - collab-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collab-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - collab-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  collab-network:
    driver: bridge

volumes:
  backend-uploads:
    driver: local

